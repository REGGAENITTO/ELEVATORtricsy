    <button id="dreset">↺ Reset</button>
    <script>
      const $ = s => document.querySelector(s);
      const pill = n => $('[data-pencil-name="'+n+'"]');
      const FLOORS = [
        { name:'f3',  key:'nature',  n:3,  idx:0 },
        { name:'f2',  key:'face',    n:2,  idx:1 },
        { name:'f1',  key:'finger',  n:1,  idx:2 },
        { name:'f0',  key:'hub',     n:0,  idx:3 },
        { name:'fm1', key:'parking', n:-1, idx:4 },
      ];
      const byIdx = i => FLOORS.find(f=>f.idx===i);
      const cabinTop = i => i*160 + 22;        // 0=NATURE (top) … 4=PARKING (bottom)
      // cabin travel = real KONE low-rise speed (~1.6 m/s nominal, ~3.5 m floor-to-floor) + accel/decel overhead
      const LIFT_MPS=1.6, FLOOR_M=3.5, ACCEL_S=0.9;
      const travelSec = fl => fl ? +(ACCEL_S + fl*FLOOR_M/LIFT_MPS).toFixed(2) : 0;   // duration ∝ floors travelled
      const CTR = 'background-color .4s ease, background-image .4s ease, border-color .4s ease, box-shadow .4s ease';

      // lifts — left idles at NATURE(0), right idles at PARKING(4); both passive by default
      const Llift = $('[data-pencil-id="zGHxJ"]');   // left  (-20px)
      const Rlift = $('[data-pencil-id="a71gwK"]');  // right (836px)

      const Rcab  = Rlift.querySelector('[data-pencil-name="cabin"]');
      function ensureDir(cab){                       // passive cabin had no arrow — clone one in
        let d = cab.querySelector('[data-pencil-name="dir"]');
        if(!d){ d = Rcab.querySelector('[data-pencil-name="dir"]').cloneNode(true); cab.appendChild(d); }
        return d;
      }
      const L = { el:Llift, cab:Lcab, dir:ensureDir(Lcab), home:0, label:'A' };
      const R = { el:Rlift, cab:Rcab, dir:ensureDir(Rcab), home:4, label:'B' };
      [Lcab,Rcab].forEach(c=> c.style.transition = CTR);

      // --- cabin interior revealed when the doors open: direction arrow + man & woman (Jakub's SVG from figures/) ---
      const ARROW_PATH='M23.62,16.74L13.49.84c-.34-.53-.91-.84-1.54-.84s-1.2.32-1.54.84L.29,16.74c-.19.29-.29.63-.29.98,0,.63.32,1.2.85,1.54.41.26.9.35,1.38.24.48-.11.88-.39,1.15-.8l6.76-10.61v25.32c0,1.01.82,1.83,1.83,1.83s1.83-.82,1.83-1.83V8.09l6.76,10.61c.26.41.67.7,1.15.8.48.11.97.02,1.38-.24.85-.54,1.1-1.67.56-2.52Z';
      const CAB_INNER =
        '<svg data-pencil-name="dir" viewBox="0 0 23.9 35.24" preserveAspectRatio="xMidYMid meet" style="left:34px;top:9px;width:24px;height:32px;z-index:1">'+

        '</svg>'+
        '<svg class="cab-fig" data-pencil-name="people" viewBox="0 0 65.29 69.17" preserveAspectRatio="xMidYMid meet" style="left:14px;top:47px;width:64px;height:67px;z-index:0">'+
          '<circle cx="13.87" cy="6.44" r="6.44" fill="#FFFFFF"/>'+
          '<circle cx="49.11" cy="6.98" r="6.44" fill="#FFFFFF"/>'+
          '<path fill="#FFFFFF" d="M28.27,21.75c0-2.04-.9-3.8-2.28-5.09-1.47-1.37-3.47-2.03-5.47-2.03H7.81c-2.01,0-4,.66-5.47,2.03C.95,17.95.06,19.71.05,21.75L0,40.22c0,1.35,1.53,2.16,2.58,2.16,1.12,0,2.56-.78,2.57-2.16l.13-16.42c0-.3,1.27-.33,1.27.19l.1,42.28c0,1.79,2.24,2.94,3.66,2.84,1.49-.1,3.3-1.38,3.31-3.22l.03-23.44c.03-.12.23-.17.46-.19.02,0,.04,0,.06,0,.02,0,.04,0,.06,0,.23.01.42.07.46.19l.03,23.44c0,1.84,1.81,3.12,3.31,3.22,1.42.1,3.66-1.05,3.66-2.84l.1-42.28c0-.52,1.27-.49,1.27-.19l.13,16.42c.01,1.38,1.44,2.17,2.57,2.16,1.05,0,2.59-.81,2.58-2.16l-.05-18.47Z"/>'+
          '<path fill="#FFFFFF" d="M65.2,37.93l-5.64-17.57c-.36-1.13-1.02-2.06-1.85-2.81-1.25-1.12-2.93-1.64-4.61-1.64h-8.17c-1.68,0-3.36.52-4.61,1.64-.83.74-1.49,1.68-1.85,2.81l-5.64,17.57c-.43,1.35.96,2.68,1.98,2.9,1.2.27,2.54-.38,2.96-1.71l4.67-14.81c.16-.51.99-.6,1.15-.26l-6.78,23.87c-.15.52-.28.96-.08,1.31.21.37.59.57,1.14.59l4.44.14.18,16.88c.02,1.56,1.96,2.5,3.15,2.29,1.41-.25,2.65-1.27,2.66-2.94l.05-16c.09-.19.36-.28.67-.29.31.02.58.11.67.29l.05,16c0,1.67,1.25,2.69,2.66,2.94,1.19.21,3.14-.73,3.15-2.29l.18-16.88,4.44-.14c.55-.02.92-.22,1.14-.59.2-.35.07-.79-.08-1.31l-6.78-23.87c.16-.35.99-.25,1.15.26l4.67,14.81c.42,1.33,1.76,1.98,2.96,1.71,1.01-.23,2.41-1.55,1.98-2.9Z"/>'+
        '</svg>';
      function buildCabin(o){
        const cab=o.cab;
        cab.querySelectorAll(':scope > svg').forEach(el=> el.style.display='none');   // hide legacy elevator glyph + side arrow
        const inner=document.createElement('div'); inner.className='cab-inner'; inner.innerHTML=CAB_INNER;
        const dl=document.createElement('div'); dl.className='cab-door cab-door-l';
        const dr=document.createElement('div'); dr.className='cab-door cab-door-r';
        // centred direction arrow shown ON the closed doors (in front) — tells you where the lift will go until it opens
        const cdir=document.createElement('div'); cdir.className='cab-cdir';
        cdir.innerHTML='<svg viewBox="0 0 23.9 35.24" preserveAspectRatio="xMidYMid meet"><path fill="#EAF1FF" d="'+ARROW_PATH+'"/></svg>';
        cab.append(inner, dl, dr, cdir);
        o.doorL=dl; o.doorR=dr; o.cdir=cdir;
        o.dir=inner.querySelector('[data-pencil-name="dir"]');   // direction arrow now lives inside; existing dir-up toggle still applies
        o.servingTo=null;
      }
      // slide the two dark doors apart / together via WAAPI (compositor transform → animates even when throttled)
      const DOOR_ANIM={duration:720, easing:'cubic-bezier(.66,0,.2,1)', fill:'forwards'};
      function slideDoors(o, open){
        if(!o.doorL) return;
        const lTo=open?'translateX(-101%)':'translateX(0)', rTo=open?'translateX(101%)':'translateX(0)';
        o.doorL.animate([{transform:o._dl||'translateX(0)'},{transform:lTo}], DOOR_ANIM);
        o.doorR.animate([{transform:o._dr||'translateX(0)'},{transform:rTo}], DOOR_ANIM);
        o._dl=lTo; o._dr=rTo;
      }
      // on arrival the arrow does a full spin about its own axis and lands pointing the onward direction
      function spinArrow(o){
        if(!o.dir) return;
        const finalDeg = o.dir.classList.contains('dir-up') ? 0 : 180;   // up lift → up, down lift → down
        o.dir.style.transform='rotate('+finalDeg+'deg)';                 // resting orientation (inline = reliable on SVG)
        o._arrowAnim?.cancel();
        o._arrowAnim = o.dir.animate(                                    // spin plays on top, lands back on the inline value
          [{transform:'rotate('+(finalDeg-360)+'deg)'},{transform:'rotate('+finalDeg+'deg)'}],
          {duration:760, delay:120, easing:'cubic-bezier(.2,.75,.2,1)'});
      }
      const openDoors  = o => { o.cab.classList.remove('cab-arriving'); o.cab.classList.add('cab-open'); o.doorsOpen=true; slideDoors(o,true); spinArrow(o); };
      const closeDoors = o => { o.cab.classList.remove('cab-open','cab-arriving'); o.doorsOpen=false; o._arrowAnim?.cancel(); o._arrowAnim=null; if(o.dir) o.dir.style.transform=''; slideDoors(o,false); };
      [L,R].forEach(buildCabin);

      function moveCab(o, toIdx){                         // drive the cabin; top duration ∝ floors → real-time position
        const fl = Math.abs((o.at ?? o.home) - toIdx), t = travelSec(fl);
        o.cab.style.transition = 'top '+t+'s var(--eio), '+CTR;

      function ensureTrail(p, key){
        if(p.querySelector('[data-pencil-name="trail"]')) return;
        const t = document.createElement('div');
        t.setAttribute('data-pencil-name','trail');
        t.style.cssText = "width:52px;height:56px;flex-shrink:0;background:url('floor-names/dotb_"+key+".png') center/contain no-repeat;";
        p.appendChild(t);
      }
      ensureTrail(pill('f3'),'nature'); ensureTrail(pill('fm1'),'parking');
      // spin the dot-mark like a wheel about its real centroid (alpha-weighted) on every interaction
      const DOT_ORIGIN={ nature:'41.5% 49.9%', face:'44.5% 54.6%', finger:'38% 55.6%', hub:'41.5% 49.9%', parking:'49.6% 50.8%' };
      FLOORS.forEach(f=>{ const t=pill(f.name).querySelector('[data-pencil-name="trail"]'); if(t) t.style.transformOrigin=DOT_ORIGIN[f.key]; });
      function spinTrail(p){ const t=p.querySelector('[data-pencil-name="trail"]'); if(!t) return; t.style.animation='none'; void t.offsetWidth; t.style.animation='spin360 .75s var(--eio)'; }

      const wm=$('[data-pencil-name="titleWordmark"]'), kick=$('[data-pencil-name="hKickTx"]'), sub=$('[data-pencil-name="hSub"]');
      const card=$('[data-pencil-id="Y57i4u"]');
      // weather pill: sun icon before "22 °C"
      (function(){ const wp=$('[data-pencil-id="thgDp"]'); if(wp) wp.insertAdjacentHTML('afterbegin',
        '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" style="width:24px;height:24px;flex-shrink:0;margin-right:6px"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'); })();
      // avatar: green status dot
      (function(){ const av=$('[data-pencil-id="oxeCT"]'); if(av){ av.style.position='relative'; av.insertAdjacentHTML('beforeend',
        '<div style="position:absolute;right:-1px;bottom:-1px;width:16px;height:16px;border-radius:50%;background:#22C55E;border:3px solid #05070d"></div>'); } })();

      // --- complete the timeline: rail spans all 5 floors + 5 station rings; cabin just overlays one ---
      function fixTimeline(lift){
        const rail = lift.querySelector('[data-pencil-name="rail"]');
        rail.style.left='57.5px'; rail.style.width='5px'; rail.style.top='76px'; rail.style.height='650px';
        const cab = lift.querySelector('[data-pencil-name="cabin"]');
        const sts = [...lift.querySelectorAll('[data-pencil-name="station"]')], out=[];
        for(let i=0;i<5;i++){
          let s = sts[i];
          if(!s){ s = sts[0].cloneNode(true); lift.insertBefore(s, cab); }   // add the missing top station
          s.style.left='50px'; s.style.top=(i*160+76)+'px';                  // align rings with cabin stops
          out[i]=s;
        }
        return out;                                                          // stations indexed by floor
      }
      L.stations=fixTimeline(Llift); R.stations=fixTimeline(Rlift);

      let curIdx=null, upLift=null, downLift=null, pulseT=null;   // upLift/downLift persist → stable assignment (no arrow flip)
      const dests=new Set();
      const setPill=(f,cls)=>{ const e=pill(f.name); e.classList.remove('dnor','dcur','dsel','pulsing'); e.classList.add(cls); };
      const setLift=(o,on,up)=>{ o.el.classList.remove('la','lp'); o.el.classList.add(on?'la':'lp'); if(on) o.dir.classList.toggle('dir-up',up); };
      const setWordmark=f=>{ wm.style.opacity='1'; wm.style.backgroundImage="url('floor-names/"+f.key+"_s.png')"; };

      // --- rebuild the Tricsy card 1:1 from Pencil (TricsyCardbutton / nobutton) ---
      card.innerHTML=
        '<div class="tc-content">'+
          '<div class="tc-head"><div class="tc-brand"><div class="tc-logo"></div><div class="tc-recommends">recommends</div></div></div>'+
          '<div class="tc-body"><div class="tc-circles" id="tcCircles"></div>'+
            '<div class="tc-txt"><div class="tc-title" id="tcTitle"></div><div class="tc-sub" id="tcSub"></div></div></div>'+
        '</div>'+
        '<div class="tc-mascot"></div>';
      const tcCircles=$('#tcCircles'), tcTitle=$('#tcTitle'), tcSub=$('#tcSub'), tcTxt=$('.tc-txt');
      const STEP=54;            // circle overlap step (px), first-pressed sits left + on top
      const circleMap=new Map();
      let txtT=null;
      function setTxt(t,s){     // blur-masked crossfade on title/sub change
        if(tcTitle.textContent===t && tcSub.textContent===s) return;
        tcTxt.style.opacity='0'; tcTxt.style.filter='blur(3px)'; clearTimeout(txtT);
        txtT=setTimeout(()=>{ tcTitle.textContent=t; tcSub.textContent=s; tcTxt.style.opacity='1'; tcTxt.style.filter='blur(0)'; },110);
      }
      function renderStops(){
        const arr=[...dests];
        circleMap.forEach((el,idx)=>{ if(!dests.has(idx)){ el.classList.add('leaving'); setTimeout(()=>el.remove(),300); circleMap.delete(idx); } });
        arr.forEach((idx,i)=>{   // add new (scales in via @starting-style), reposition existing (left transitions)
          let el=circleMap.get(idx);
          if(!el){ el=document.createElement('div'); el.className='tc-circle'; el.textContent=byIdx(idx).n; tcCircles.appendChild(el); circleMap.set(idx,el); }
          el.style.left=(i*STEP)+'px'; el.style.zIndex=String(100-i);
        });
        tcCircles.style.width = arr.length ? ((arr.length-1)*STEP+75)+'px' : '0px';
        if(arr.length===0) setTxt('Hi! Where can I take you?','Elevators coming');
        else if(arr.length===1){ const f=byIdx(arr[0]); setTxt('Take '+f.key.toUpperCase()+' · Floor '+f.n,'Your destination'); }
        else setTxt('Lift is coming','Have a nice day');
      }

      // dispatch + UI for the current set of destinations (multi-select)
      function route(){
        const up=[...dests].filter(i=>i<curIdx), down=[...dests].filter(i=>i>curIdx);
        // stable: a lift keeps its direction; a NEW direction takes the other (free) lift. Arrow = its onward travel.
        if(!up.length)   upLift=null;
        if(!down.length) downLift=null;
        const nearest=(Math.abs(curIdx-L.home)<=Math.abs(curIdx-R.home))?L:R;
        if(up.length   && !upLift)   upLift   = (downLift===L)?R : (downLift===R)?L : nearest;
        if(down.length && !downLift) downLift = (upLift===L)?R   : (upLift===R)?L   : nearest;
        let maxT=0;
        [L,R].forEach(o=>{
          const active = (o===upLift)||(o===downLift);
          if(active){
            setLift(o,true, o===upLift);
            if(o.cdir) o.cdir.style.transform=(o===upLift)?'rotate(0deg)':'rotate(180deg)';   // point the closed-door arrow the onward way
            if(o.servingTo!==curIdx){                       // fresh dispatch to the pickup floor
              clearTimeout(o.doorT); o.doorT=null; closeDoors(o);
              const t=moveCab(o,curIdx); o.servingTo=curIdx; maxT=Math.max(maxT,t);
              if(t>0){ o.cab.classList.add('cab-arriving'); o.doorT=setTimeout(()=>{ o.doorT=null; openDoors(o); }, t*1000); }   // pulse while approaching, open on arrival
              else openDoors(o);
            } else if(!o.doorsOpen && !o.doorT) openDoors(o);   // already parked at the pickup floor (idled here) → just open
          } else {                                          // unused lift idles home, doors shut
            clearTimeout(o.doorT); o.doorT=null; closeDoors(o); setLift(o,false);
            if(o.servingTo!==o.home) moveCab(o,o.home);
            o.servingTo=o.home;
          }
        });
        // blue stop-rings = floors each active cabin will stop at (its served destinations)
        [L,R].forEach(o=> o.stations.forEach(s=>s.classList.remove('stop')));
        up.forEach(i=>{ if(upLift) upLift.stations[i].classList.add('stop'); });
        down.forEach(i=>{ if(downLift) downLift.stations[i].classList.add('stop'); });
        // pulse the selected floors' glow while the lift is travelling; settle when it arrives
        const selPills=[...dests].map(i=>pill(byIdx(i).name));
        if(maxT>0){
          clearTimeout(pulseT);
          document.querySelectorAll('.pulsing').forEach(p=>p.classList.remove('pulsing'));
          selPills.forEach(p=>p.classList.add('pulsing'));
          pulseT=setTimeout(()=>{ document.querySelectorAll('.pulsing').forEach(p=>p.classList.remove('pulsing')); pulseT=null; }, maxT*1000);
        } else if(pulseT){ selPills.forEach(p=>p.classList.add('pulsing')); }
        setWordmark(byIdx(curIdx));
        renderStops();
        if(dests.size===0){ kick.textContent='YOU ARE HERE'; sub.textContent='Step 2 · tap your destination'; return; }
        const parts=[]; if(upLift) parts.push('Lift '+upLift.label+' up'); if(downLift) parts.push('Lift '+downLift.label+' down');
        kick.textContent='ON ROUTE';
        sub.textContent=dests.size+' floor'+(dests.size>1?'s':'')+' · '+parts.join(', ');
      }

      function onClick(f, e){
        spinTrail(pill(f.name));     // dot-mark spins on every interaction
        if(curIdx===null){ curIdx=f.idx; setPill(f,'dcur'); setWordmark(f);
          kick.textContent='YOU ARE HERE'; sub.textContent='Step 2 · tap your destination'; return; }   // step 1 = where I am
        if(f.idx===curIdx) return;                                              // can't ride to my own floor
        if(dests.has(f.idx)){ dests.delete(f.idx); setPill(f,'dnor'); }         // multi-select: toggle destination
        else { dests.add(f.idx); setPill(f,'dsel'); }                           // blue fills left→right via .dsel::before
        route();
      }

      function reset(){
        curIdx=null; upLift=null; downLift=null; dests.clear(); clearTimeout(pulseT); pulseT=null;
        [L,R].forEach(o=> o.stations && o.stations.forEach(s=>s.classList.remove('stop')));
        FLOORS.forEach(f=>setPill(f,'dnor'));
        setLift(L,false); setLift(R,false);
        [L,R].forEach(o=>{ clearTimeout(o.doorT); o.doorT=null; closeDoors(o); o.servingTo=o.home; });
        Lcab.style.transition=Rcab.style.transition='none';
        Lcab.style.top=cabinTop(L.home)+'px'; Rcab.style.top=cabinTop(R.home)+'px';
        L.at=L.home; R.at=R.home;
        Lcab.getBoundingClientRect();
        Lcab.style.transition=Rcab.style.transition=CTR;
        renderStops();
        kick.textContent='STEP 1 · YOUR FLOOR'; sub.textContent='Tap the floor you are on'; wm.style.opacity='0';
      }

      FLOORS.forEach(f=> pill(f.name).addEventListener('click', e=>onClick(f,e)) );
      $('#dreset').addEventListener('click', reset);
      reset();

      // scale the 1080×1920 board to fit the viewport
      const root = $('[data-pencil-id="y4ArJ"]');
      root.style.transformOrigin='top left';
      function fit(){ const s=Math.min(innerWidth/1080, innerHeight/1920); root.style.position='absolute'; root.style.transform='scale('+s+')'; root.style.left=(innerWidth-1080*s)/2+'px'; root.style.top=(innerHeight-1920*s)/2+'px'; }
      addEventListener('resize', fit); addEventListener('load', fit); fit();
    </script>
  </body>
</html>
